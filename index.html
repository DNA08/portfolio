// ─────────────────────────────────────────────
// FADEIN
// ─────────────────────────────────────────────
function FadeIn({ children, delay = 0, duration, x = 0, y = 30, style, className }) {
  const [visible, setVisible] = React.useState(false);
  const ref = React.useRef(null);
  const { mot } = useDesign();
  const baseDur = duration !== undefined ? duration : 0.7;
  const dur = baseDur * (mot.dur / 0.7);
  const ay = y * mot.yMult;
  const ax = x * mot.yMult;

  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const trigger = () => requestAnimationFrame(() => requestAnimationFrame(() => setVisible(true)));
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight + 50 && rect.bottom > -50) { trigger(); return; }
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { trigger(); obs.disconnect(); }
    }, { rootMargin: '50px 0px', threshold: 0 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  return React.createElement('div', {
    ref, className,
    style: {
      ...style,
      opacity: visible ? 1 : 0,
      transform: visible ? 'translate(0,0)' : 'translate(' + ax + 'px,' + ay + 'px)',
      transition: 'opacity ' + dur + 's cubic-bezier(0.25,0.1,0.25,1) ' + delay + 's, transform ' + dur + 's cubic-bezier(0.25,0.1,0.25,1) ' + delay + 's',
    },
  }, children);
}

function Magnet({ children, padding = 150, strength = 3 }) {
  const [pos, setPos] = React.useState({ x: 0, y: 0 });
  const [active, setActive] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const h = (e) => {
      const el = ref.current;
      if (!el) return;
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      const dx = e.clientX - cx, dy = e.clientY - cy;
      const ok = Math.abs(dx) < r.width / 2 + padding && Math.abs(dy) < r.height / 2 + padding;
      setActive(ok);
      setPos(ok ? { x: dx / strength, y: dy / strength } : { x: 0, y: 0 });
    };
    window.addEventListener('mousemove', h);
    return () => window.removeEventListener('mousemove', h);
  }, [padding, strength]);
  return React.createElement('div', {
    ref,
    style: {
      transform: 'translate3d(' + pos.x + 'px,' + pos.y + 'px,0)',
      transition: active ? 'transform 0.3s ease-out' : 'transform 0.6s ease-in-out',
      willChange: 'transform',
      display: 'inline-block',
    },
  }, children);
}

}

function AnimatedTextInner({ text, textStyle }) {
  const ref = React.useRef(null);
  const M = window.Motion;
  const { scrollYProgress } = M.useScroll({ target: ref, offset: ['start 0.8', 'end 0.2'] });

}

function AnimatedText({ text, textStyle }) {
  const M = window.Motion;
  if (!M || !M.useScroll) return React.createElement('p', { style: textStyle }, text);

}

function MarqueeSection() {
  const [offset, setOffset] = React.useState(0);
  const ref = React.useRef(null);
  const { mot } = useDesign();

  React.useEffect(() => {
    const speed = mot.marq;
    const handle = () => {
      if (!ref.current) return;
      const sectionTop = ref.current.getBoundingClientRect().top + window.scrollY;
      setOffset((window.scrollY - sectionTop + window.innerHeight) * speed);
    };
    window.addEventListener('scroll', handle, { passive: true });
    handle();
    return () => window.removeEventListener('scroll', handle);
  }, [mot.marq]);

  const r1 = IMAGES.slice(0, 11);
